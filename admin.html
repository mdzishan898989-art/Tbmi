<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>অ্যাডমিন CMS | TBMI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3c72;
            --primary-dark: #0a2a4a;
            --secondary: #ff9800;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --white: #ffffff;
            --shadow: 0 5px 30px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--light);
            color: var(--dark);
            transition: var(--transition);
        }

        body.dark-mode {
            --light: #1a1a2e;
            --white: #1e1e2e;
            --gray: #aaa;
            background: var(--light);
            color: #eee;
        }

        /* Login Box */
        .login-box {
            max-width: 450px;
            margin: 100px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .login-box h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .login-box p {
            color: var(--gray);
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .login-box button:hover {
            background: var(--secondary);
        }
        .error-msg {
            color: #e74c3c;
            margin: 10px 0;
            display: none;
            font-size: 0.9rem;
        }

        /* Dashboard Layout */
        .dashboard {
            display: none;
        }
        .sidebar {
            width: 280px;
            background: var(--white);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            transition: var(--transition);
            z-index: 100;
        }
        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            text-align: center;
        }
        .sidebar-header h3 {
            color: var(--primary);
            margin-bottom: 5px;
        }
        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--gray);
        }
        .sidebar-nav {
            padding: 20px 0;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--dark);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
        }
        .sidebar-nav a i {
            width: 24px;
            font-size: 1.1rem;
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--primary);
            color: white;
        }
        .main-content {
            margin-left: 280px;
            padding: 20px;
            transition: var(--transition);
        }
        .top-bar {
            background: var(--white);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
        }
        .top-bar h2 {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .top-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .top-actions button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--dark);
            transition: var(--transition);
        }
        .top-actions button:hover {
            color: var(--secondary);
        }
        .card {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        .card h3 {
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 1.3rem;
            border-left: 4px solid var(--secondary);
            padding-left: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            background: var(--white);
            color: var(--dark);
        }
        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .btn-save:hover {
            background: var(--secondary);
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-delete:hover {
            background: #c0392b;
        }
        .item-list {
            margin-top: 25px;
        }
        .item-card {
            background: var(--light);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .item-info {
            flex: 1;
        }
        .item-info strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .item-info small {
            color: var(--gray);
            font-size: 0.8rem;
        }
        .gallery-preview {
            width: 60px;
            height: 60px;
            background: #ddd;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            margin-right: 15px;
        }
        .flex-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
            .sidebar-nav a {
                display: inline-flex;
                width: auto;
                margin: 5px;
            }
            .sidebar-nav {
                text-align: center;
            }
        }
        /* Language & Dark mode styles */
        [data-lang-key] {
            transition: all 0.2s;
        }
        .hidden-section {
            display: none;
        }
    </style>
</head>
<body>

<!-- Login Box -->
<div id="loginContainer" class="login-box">
    <h2><i class="fas fa-lock"></i> <span data-lang-key="admin_title">অ্যাডমিন প্যানেল</span></h2>
    <p data-lang-key="admin_subtitle">দয়া করে লগইন করুন</p>
    <input type="text" id="username" placeholder="ইউজারনেম" data-lang-key="username_placeholder">
    <input type="password" id="password" placeholder="পাসওয়ার্ড" data-lang-key="password_placeholder">
    <div id="loginError" class="error-msg"></div>
    <button onclick="login()" data-lang-key="login_btn">লগইন</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>TBMI CMS</h3>
            <p data-lang-key="dashboard_subtitle">কন্টেন্ট ম্যানেজমেন্ট</p>
        </div>
        <div class="sidebar-nav">
            <a href="#" class="active" onclick="showSection('settings')"><i class="fas fa-sliders-h"></i> <span data-lang-key="menu_settings">সাইট সেটিংস</span></a>
            <a href="#" onclick="showSection('notices')"><i class="fas fa-bullhorn"></i> <span data-lang-key="menu_notices">নোটিশ</span></a>
            <a href="#" onclick="showSection('teachers')"><i class="fas fa-chalkboard-user"></i> <span data-lang-key="menu_teachers">শিক্ষকমণ্ডলী</span></a>
            <a href="#" onclick="showSection('gallery')"><i class="fas fa-images"></i> <span data-lang-key="menu_gallery">গ্যালারি</span></a>
            <a href="#" onclick="showSection('faq')"><i class="fas fa-question-circle"></i> <span data-lang-key="menu_faq">FAQ</span></a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span data-lang-key="menu_logout">লগআউট</span></a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h2 id="sectionTitle" data-lang-key="settings_title">সাইট সেটিংস</h2>
            <div class="top-actions">
                <button id="darkModeToggle"><i class="fas fa-moon"></i></button>
                <button id="langToggle"><span>EN</span></button>
                <button id="saveSettingsBtn" class="btn-save" onclick="saveSettings()" data-lang-key="save_btn">সেভ করুন</button>
            </div>
        </div>

        <!-- Settings Section -->
        <div id="settingsSection" class="card">
            <h3 data-lang-key="settings_general">সাইটের মৌলিক তথ্য</h3>
            <div class="form-group">
                <label data-lang-key="college_name_bn_label">কলেজের নাম (বাংলা)</label>
                <input type="text" id="college_name_bn" placeholder="টেকনিক্যাল অ্যান্ড বিজনেস ম্যানেজমেন্ট ইনস্টিটিউট">
            </div>
            <div class="form-group">
                <label data-lang-key="college_name_en_label">কলেজের নাম (ইংরেজি)</label>
                <input type="text" id="college_name_en" placeholder="Technical & Business Management Institute">
            </div>
            <div class="form-group">
                <label data-lang-key="college_code_label">কলেজ কোড</label>
                <input type="text" id="college_code" placeholder="11011">
            </div>
            <div class="form-group">
                <label data-lang-key="eiin_label">EIIN</label>
                <input type="text" id="eiin" placeholder="132253">
            </div>
            <div class="form-group">
                <label data-lang-key="est_year_label">প্রতিষ্ঠা সাল</label>
                <input type="text" id="est_year" placeholder="2004">
            </div>
            <div class="form-group">
                <label data-lang-key="logo_url_label">লোগো URL</label>
                <input type="text" id="logo_url" placeholder="https://...">
            </div>
            <div class="form-group">
                <label data-lang-key="phone_label">ফোন নম্বর</label>
                <input type="text" id="phone" placeholder="+8801309132253">
            </div>
            <div class="form-group">
                <label data-lang-key="email_label">ইমেইল</label>
                <input type="email" id="email" placeholder="info@tbmi.edu.bd">
            </div>
            <div class="form-group">
                <label data-lang-key="address_bn_label">ঠিকানা (বাংলা)</label>
                <input type="text" id="address_bn" placeholder="ভাওলাগঞ্জ, দেবীগঞ্জ, পঞ্চগড়">
            </div>
            <div class="form-group">
                <label data-lang-key="address_en_label">ঠিকানা (ইংরেজি)</label>
                <input type="text" id="address_en" placeholder="Bhawlagonj, Debiganj, Panchagarh">
            </div>
        </div>

        <!-- Notices Section -->
        <div id="noticesSection" class="card" style="display:none;">
            <h3 data-lang-key="add_notice_title">নতুন নোটিশ যোগ করুন</h3>
            <div class="form-group">
                <label data-lang-key="notice_title_label">শিরোনাম</label>
                <input type="text" id="noticeTitle" placeholder="নোটিশের শিরোনাম">
            </div>
            <div class="form-group">
                <label data-lang-key="notice_date_label">তারিখ</label>
                <input type="date" id="noticeDate">
            </div>
            <div class="form-group">
                <label data-lang-key="notice_category_label">ক্যাটাগরি</label>
                <select id="noticeCategory">
                    <option value="admission">অ্যাডমিশন</option>
                    <option value="academic">একাডেমিক</option>
                    <option value="exam">পরীক্ষা</option>
                    <option value="event">ইভেন্ট</option>
                </select>
            </div>
            <button class="btn-save" onclick="addNotice()" data-lang-key="add_btn">যোগ করুন</button>
            <div class="item-list" id="noticesList"></div>
        </div>

        <!-- Teachers Section -->
        <div id="teachersSection" class="card" style="display:none;">
            <h3 data-lang-key="add_teacher_title">নতুন শিক্ষক যোগ করুন</h3>
            <div class="form-group">
                <label data-lang-key="teacher_name_bn_label">নাম (বাংলা)</label>
                <input type="text" id="teacher_name_bn" placeholder="মোঃ আহসান হাবিব">
            </div>
            <div class="form-group">
                <label data-lang-key="teacher_name_en_label">নাম (ইংরেজি)</label>
                <input type="text" id="teacher_name_en" placeholder="Md. Ahsan Habib">
            </div>
            <div class="form-group">
                <label data-lang-key="teacher_position_label">পদবি</label>
                <input type="text" id="teacher_position" placeholder="অধ্যক্ষ">
            </div>
            <div class="form-group">
                <label data-lang-key="teacher_qualification_label">যোগ্যতা</label>
                <input type="text" id="teacher_qualification" placeholder="এমএ, বিএড">
            </div>
            <div class="form-group">
                <label data-lang-key="teacher_image_label">ছবি URL</label>
                <input type="text" id="teacher_image" placeholder="https://...">
            </div>
            <button class="btn-save" onclick="addTeacher()" data-lang-key="add_btn">যোগ করুন</button>
            <div class="item-list" id="teachersList"></div>
        </div>

        <!-- Gallery Section -->
        <div id="gallerySection" class="card" style="display:none;">
            <h3 data-lang-key="add_gallery_title">নতুন ছবি যোগ করুন</h3>
            <div class="form-group">
                <label data-lang-key="gallery_url_label">ছবির URL</label>
                <input type="text" id="galleryImageUrl" placeholder="https://...">
            </div>
            <div class="form-group">
                <label data-lang-key="gallery_title_bn_label">শিরোনাম (বাংলা)</label>
                <input type="text" id="galleryTitleBn" placeholder="ক্যাম্পাস ভিউ">
            </div>
            <div class="form-group">
                <label data-lang-key="gallery_title_en_label">শিরোনাম (ইংরেজি)</label>
                <input type="text" id="galleryTitleEn" placeholder="Campus View">
            </div>
            <div class="form-group">
                <label data-lang-key="gallery_category_label">ক্যাটাগরি</label>
                <select id="galleryCategory">
                    <option value="campus">ক্যাম্পাস</option>
                    <option value="event">ইভেন্ট</option>
                    <option value="lab">ল্যাব</option>
                    <option value="sports">ক্রীড়া</option>
                </select>
            </div>
            <button class="btn-save" onclick="addGalleryImage()" data-lang-key="add_btn">যোগ করুন</button>
            <div class="item-list" id="galleryList"></div>
        </div>

        <!-- FAQ Section -->
        <div id="faqSection" class="card" style="display:none;">
            <h3 data-lang-key="add_faq_title">নতুন FAQ যোগ করুন</h3>
            <div class="form-group">
                <label data-lang-key="faq_question_bn_label">প্রশ্ন (বাংলা)</label>
                <input type="text" id="faqQuestionBn" placeholder="কিভাবে অ্যাডমিশন নিতে হয়?">
            </div>
            <div class="form-group">
                <label data-lang-key="faq_question_en_label">প্রশ্ন (ইংরেজি)</label>
                <input type="text" id="faqQuestionEn" placeholder="How to get admission?">
            </div>
            <div class="form-group">
                <label data-lang-key="faq_answer_bn_label">উত্তর (বাংলা)</label>
                <textarea id="faqAnswerBn" rows="3" placeholder="অনলাইনে আবেদন ফর্ম পূরণ করে..."></textarea>
            </div>
            <div class="form-group">
                <label data-lang-key="faq_answer_en_label">উত্তর (ইংরেজি)</label>
                <textarea id="faqAnswerEn" rows="3" placeholder="Fill the online application form..."></textarea>
            </div>
            <div class="form-group">
                <label data-lang-key="faq_category_label">ক্যাটাগরি</label>
                <select id="faqCategory">
                    <option value="admission">অ্যাডমিশন</option>
                    <option value="academic">একাডেমিক</option>
                    <option value="fee">ফি ও স্কলারশিপ</option>
                    <option value="placement">প্লেসমেন্ট</option>
                </select>
            </div>
            <button class="btn-save" onclick="addFaq()" data-lang-key="add_btn">যোগ করুন</button>
            <div class="item-list" id="faqList"></div>
        </div>
    </div>
</div>

<script>
    // ================= Firebase Config =================
    const firebaseConfig = {
        apiKey: "AIzaSyAHEt2yaZOq5lpgw96r12uGP4iHmvkWL3E",
        authDomain: "tbmi-cms.firebaseapp.com",
        projectId: "tbmi-cms",
        storageBucket: "tbmi-cms.firebasestorage.app",
        messagingSenderId: "754106603923",
        appId: "1:754106603923:web:579fc0ddf3292a39917066",
        measurementId: "G-HFQMSD9QG4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const settingsCollection = db.collection('settings');
    const noticesCollection = db.collection('notices');
    const teachersCollection = db.collection('teachers');
    const galleryCollection = db.collection('gallery');
    const faqCollection = db.collection('faq');

    // ================= Login =================
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        if (username === '11011' && password === 'tbmi132253') {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadAllData();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').innerText = 'ভুল ইউজারনেম বা পাসওয়ার্ড!';
        }
    }
    function logout() {
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').style.display = 'none';
    }

    // ================= Section Navigation =================
    function showSection(section) {
        document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
        event.target.closest('a').classList.add('active');

        document.getElementById('settingsSection').style.display = 'none';
        document.getElementById('noticesSection').style.display = 'none';
        document.getElementById('teachersSection').style.display = 'none';
        document.getElementById('gallerySection').style.display = 'none';
        document.getElementById('faqSection').style.display = 'none';

        document.getElementById(section + 'Section').style.display = 'block';

        const titles = {
            settings: 'সাইট সেটিংস',
            notices: 'নোটিশ ম্যানেজমেন্ট',
            teachers: 'শিক্ষকমণ্ডলী',
            gallery: 'গ্যালারি',
            faq: 'FAQ'
        };
        document.getElementById('sectionTitle').innerText = titles[section];
    }

    // ================= Load Data =================
    async function loadAllData() {
        await loadSettings();
        await loadNotices();
        await loadTeachers();
        await loadGallery();
        await loadFaq();
    }

    // Settings
    async function loadSettings() {
        const doc = await settingsCollection.doc('site_info').get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('college_name_bn').value = data.college_name_bn || '';
            document.getElementById('college_name_en').value = data.college_name_en || '';
            document.getElementById('college_code').value = data.college_code || '';
            document.getElementById('eiin').value = data.eiin || '';
            document.getElementById('est_year').value = data.est_year || '';
            document.getElementById('logo_url').value = data.logo_url || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('address_bn').value = data.address_bn || '';
            document.getElementById('address_en').value = data.address_en || '';
        }
    }
    async function saveSettings() {
        const settings = {
            college_name_bn: document.getElementById('college_name_bn').value,

    // Notices
    async function loadNotices() {
        const snapshot = await noticesCollection.orderBy('date', 'desc').get();
        const container = document.getElementById('noticesList');
        container.innerHTML = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            const catMap = { admission: 'অ্যাডমিশন', academic: 'একাডেমিক', exam: 'পরীক্ষা', event: 'ইভেন্ট' };
            container.innerHTML += `
                <div class="item-card">
                    <div class="item-info">
                        <strong>${data.title}</strong>
                        <small>${data.date} | ${catMap[data.category]}</small>
                    </div>
                    <button class="btn-delete" onclick="deleteNotice('${doc.id}')"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    }
    async function addNotice() {
        const title = document.getElementById('noticeTitle').value;
        const date = document.getElementById('noticeDate').value;
        const category = document.getElementById('noticeCategory').value;
        if (!title || !date) { alert('শিরোনাম ও তারিখ দিন!'); return; }
        await noticesCollection.add({ title, date, category });
        document.getElementById('noticeTitle').value = '';
        document.getElementById('noticeDate').value = '';
        loadNotices();
        alert('নোটিশ যোগ হয়েছে!');
    }
    async function deleteNotice(id) {
        if (confirm('নোটিশটি ডিলিট করবেন?')) {
            await noticesCollection.doc(id).delete();
            loadNotices();
        }
    }

    let currentLang = 'bn';
    function applyLanguage() {
        document.querySelectorAll('[data-lang-key]').forEach(el => {
            const key = el.getAttribute('data-lang-key');
            if (langData[currentLang][key]) {
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
                    el.placeholder = langData[currentLang][key];
                } else {
                    el.innerText = langData[currentLang][key];
                }
            }
        });
        // Update section title if not covered
        document.getElementById('sectionTitle').innerText = langData[currentLang].settings_title;
        // Update button text
        document.querySelectorAll('.btn-save').forEach(btn => {
            if (btn.id !== 'saveSettingsBtn') btn.innerText = langData[currentLang].add_btn;
        });
    }
    document.getElementById('langToggle').addEventListener('click', () => {
        currentLang = currentLang === 'bn' ? 'en' : 'bn';
        document.getElementById('langToggle').querySelector('span').innerText = currentLang === 'bn' ? 'EN' : 'BN';
        applyLanguage();
    });

    // Dark Mode
    const darkToggle = document.getElementById('darkModeToggle');
    darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const icon = darkToggle.querySelector('i');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    });

    // Initial load
    applyLanguage();
