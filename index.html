<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TBMI | টেকনিক্যাল অ্যান্ড বিজনেস ম্যানেজমেন্ট ইনস্টিটিউট</title>
    <meta name="description" content="টেকনিক্যাল অ্যান্ড বিজনেস ম্যানেজমেন্ট ইনস্টিটিউট - প্রযুক্তি ও ব্যবসায় শিক্ষায় দক্ষ পেশাজীবী তৈরির সেরা প্রতিষ্ঠান">
    <meta name="keywords" content="টেকনিক্যাল কলেজ, বিজনেস ম্যানেজমেন্ট, কম্পিউটার টেকনোলজি, HRD, পঞ্চগড়">
    <meta name="author" content="TBMI">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Swiper Slider -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3c72;
            --primary-dark: #0a2a4a;
            --primary-light: #2a5298;
            --secondary: #ff9800;
            --secondary-dark: #e68900;
            --accent: #2ecc71;
            --accent-dark: #27ae60;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --white: #ffffff;
            --black: #000000;
            --shadow: 0 5px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: var(--white);
            overflow-x: hidden;
        }

        /* Dark Mode */
        body.dark-mode {
            --dark: #f8f9fa;
            --light: #1a1a2e;
            --white: #1e1e2e;
            --black: #ffffff;
            background: var(--light);
            color: var(--dark);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--light);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: var(--secondary);
            color: var(--white);
        }
        .btn-secondary:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }
        .btn-outline {
            border: 2px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }
        .btn-outline:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Section Styles */
        .section {
            padding: 80px 0;
        }
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--primary);
            position: relative;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--secondary);
        }
        .section-subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        /* Header & Navigation */
        header {
            background: var(--white);
            box-shadow: var(--shadow);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            transition: var(--transition);
        }
        header.scrolled {
            padding: 5px 0;
            background: var(--white);
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }
        .logo h1 {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .logo p {
            font-size: 0.8rem;
            color: var(--secondary);
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: var(--transition);
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--secondary);
        }
        .nav-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .dark-mode-toggle,
        .lang-toggle,
        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--dark);
            transition: var(--transition);
        }
        .dark-mode-toggle:hover,
        .lang-toggle:hover {
            color: var(--secondary);
        }
        .menu-toggle {
            display: none;
            font-size: 1.5rem;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(30,60,114,0.9), rgba(42,82,152,0.9)), url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1600') center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--white);
            margin-top: 80px;
        }
        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .hero-content .typed-text {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Counter Section */
        .counter-section {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            padding: 60px 0;
        }
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            text-align: center;
        }
        .counter-item h3 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .counter-item p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Notice Board */
        .notice-section {
            background: var(--light);
        }
        .notice-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 25px;
            background: var(--white);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .tab-btn.active {
            background: var(--primary);
            color: var(--white);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .notice-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .notice-item {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: var(--shadow);
        }
        .notice-info h4 {
            margin-bottom: 5px;
        }
        .notice-date {
            font-size: 0.85rem;
            color: var(--gray);
        }
        .notice-category {
            background: var(--secondary);
            color: var(--white);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* Features */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .feature-card {
            background: var(--white);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .feature-card:hover {
            transform: translateY(-10px);
        }
        .feature-card i {
            font-size: 3rem;
            color: var(--secondary);
            margin-bottom: 20px;
        }
        .feature-card h3 {
            margin-bottom: 15px;
            color: var(--primary);
        }

        /* Courses */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .course-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .course-card:hover {
            transform: translateY(-5px);
        }
        .course-img {
            height: 200px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 3rem;
        }
        .course-content {
            padding: 20px;
        }
        .course-content h3 {
            margin-bottom: 10px;
        }
        .course-meta {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            color: var(--gray);
        }

        /* Teachers */
        .teachers-slider {
            padding: 20px 0;
        }
        .teacher-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .teacher-img {
            width: 100%;
            height: 250px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 4rem;
        }
        .teacher-content {
            padding: 20px;
        }
        .teacher-content h3 {
            margin-bottom: 5px;
        }
        .teacher-content p {
            color: var(--secondary);
            margin-bottom: 10px;
        }

        /* Testimonials */
        .testimonials-slider {
            padding: 20px 0;
        }
        .testimonial-card {
            background: var(--white);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .testimonial-card i {
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 15px;
        }
        .testimonial-card h4 {
            margin-top: 15px;
            color: var(--primary);
        }

        /* FAQ */
        .faq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }
        .faq-item {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
        }
        .faq-question {
            padding: 20px;
            background: var(--primary);
            color: var(--white);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-answer {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .faq-item.active .faq-answer {
            padding: 20px;
            max-height: 300px;
        }

        /* Newsletter */
        .newsletter {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            text-align: center;
            padding: 60px 0;
        }
        .newsletter-form {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .newsletter-form input {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            width: 300px;
            font-size: 1rem;
        }
        .newsletter-form button {
            background: var(--secondary);
            color: var(--white);
            border: none;
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: var(--white);
            padding: 60px 0 20px;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }
        .footer-col h3 {
            margin-bottom: 20px;
            color: var(--secondary);
        }
        .footer-col ul {
            list-style: none;
        }
        .footer-col ul li {
            margin-bottom: 10px;
        }
        .footer-col ul li a {
            color: var(--white);
            text-decoration: none;
            transition: var(--transition);
        }
        .footer-col ul li a:hover {
            color: var(--secondary);
            padding-left: 5px;
        }
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .social-links a {
            color: var(--white);
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .social-links a:hover {
            color: var(--secondary);
            transform: translateY(-3px);
        }
        .copyright {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Back to Top */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--secondary);
            color: var(--white);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 999;
        }
        .back-to-top.active {
            opacity: 1;
            visibility: visible;
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 999;
        }
        .chat-toggle {
            background: var(--secondary);
            color: var(--white);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        .chat-toggle:hover {
            transform: scale(1.05);
        }
        .chat-box {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 320px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: none;
        }
        .chat-box.active {
            display: block;
        }
        .chat-header {
            background: var(--primary);
            color: var(--white);
            padding: 15px;
        }
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
        }
        .chat-input {
            display: flex;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
        }
        .chat-input button {
            background: var(--secondary);
            color: var(--white);
            border: none;
            padding: 0 15px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .nav-links {
                position: fixed;
                top: 80px;
                left: -100%;
                width: 80%;
                height: calc(100vh - 80px);
                background: var(--white);
                flex-direction: column;
                padding: 40px;
                transition: var(--transition);
                box-shadow: var(--shadow);
            }
            .nav-links.active {
                left: 0;
            }
            .menu-toggle {
                display: block;
            }
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .section-title {
                font-size: 2rem;
            }
            .faq-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .hero {
                margin-top: 70px;
            }
            .hero-content h1 {
                font-size: 1.8rem;
            }
            .counter-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="container">
        <div class="nav-bar">
            <div class="logo">
                <h1>TBMI</h1>
                <p>টেকনিক্যাল অ্যান্ড বিজনেস ম্যানেজমেন্ট ইনস্টিটিউট</p>
            </div>
            <ul class="nav-links">
                <li><a href="#home" class="active">হোম</a></li>
                <li><a href="#admission">অ্যাডমিশন</a></li>
                <li><a href="#academic">একাডেমিক</a></li>
                <li><a href="#placement">প্লেসমেন্ট</a></li>
                <li><a href="#gallery">গ্যালারি</a></li>
                <li><a href="#contact">যোগাযোগ</a></li>
            </ul>
            <div class="nav-icons">
                <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
                <button class="lang-toggle" id="langToggle">EN</button>
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i
